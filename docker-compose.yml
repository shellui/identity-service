services:
  identity-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: shellui/identity-service:local
    container_name: identity-service
    ports:
      - "${IDENTITY_SERVICE_PORT:-8000}:8000"
    environment:
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY is required — copy .env.example to .env and set SECRET_KEY}"
      # Local compose defaults DEBUG=true (HS256 without JWT_PRIVATE_KEY). Set DEBUG=false + JWT_PRIVATE_KEY for production-like runs.
      DEBUG: "${DEBUG:-false}"
      JWT_PRIVATE_KEY: "${JWT_PRIVATE_KEY:-}"
      JWT_PUBLIC_KEY: "${JWT_PUBLIC_KEY:-}"
      JWT_KEY_ID: "${JWT_KEY_ID:-}"
      JWT_PREVIOUS_PUBLIC_KEY: "${JWT_PREVIOUS_PUBLIC_KEY:-}"
      JWT_PREVIOUS_KEY_ID: "${JWT_PREVIOUS_KEY_ID:-}"
      JWT_ACCEPT_HS256_LEGACY: "${JWT_ACCEPT_HS256_LEGACY:-true}"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-}"
      CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS:-}"
      POSTGRES_DATABASE_URL: "${POSTGRES_DATABASE_URL:-}"
      SQLITE_PATH: "/app/data/db.sqlite3"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:4000,http://localhost:5174,https://admin.shellui.com}"
      GUNICORN_WORKERS: "${GUNICORN_WORKERS:-2}"
      GUNICORN_THREADS: "${GUNICORN_THREADS:-2}"
      GUNICORN_TIMEOUT: "${GUNICORN_TIMEOUT:-60}"
    volumes:
      - identity-service-data:/app/data
    restart: unless-stopped

volumes:
  identity-service-data:
